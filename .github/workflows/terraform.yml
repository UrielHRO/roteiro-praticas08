name: "Terraform CI/CD"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permite execução manual

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate # Valida se os arquivos .tf estão corretos

      - name: Terraform Plan
        run: terraform plan -out=plan.out # Gera o plano de execução

      - name: Terraform Apply
        # No GitHub, o "apply" automático em push é comum, 
        # mas aqui ele executará após o plan.
        run: terraform apply -auto-approve plan.out